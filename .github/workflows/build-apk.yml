name: Build Loto APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Repositoryni yuklab olish
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20 o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Bog'liqliklarni o'rnatish
        working-directory: LotoApp
        run: |
          npm install
          npx expo install --fix

      - name: 🔧 EAS CLI o'rnatish
        working-directory: LotoApp
        run: npm install -g eas-cli@latest

      - name: 🔗 EAS Loyihasini yaratish
        working-directory: LotoApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas init --non-interactive --force

      - name: 🤖 EAS Build (APK)
        working-directory: LotoApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build -p android --profile preview --non-interactive --wait 2>&1 | tee build-output.txt

      - name: 📥 APK yuklab olish (EAS serverdan)
        working-directory: LotoApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "=== Oxirgi qurilish ma'lumotlari GraphQL orqali olinmoqda ==="
          APP_ID="0374b9d4-4d61-4fd0-b602-ed1c6da6e8fc"
          curl -s -X POST "https://api.expo.dev/graphql" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $EXPO_TOKEN" \
            -d "{\"query\":\"{ app { byId(appId:\\\"$APP_ID\\\") { builds(limit:1, offset:0, status:FINISHED) { id status platform artifacts { buildUrl } } } } }\"}" \
            -o builds-graphql.json
          APK_URL=$(node -e "
            try {
              var d = require('./builds-graphql.json');
              var builds = d.data.app.byId.builds;
              if (builds && builds.length > 0 && builds[0].artifacts) {
                console.log(builds[0].artifacts.buildUrl || '');
              }
            } catch(e) { console.error(e.message); }
          ")
          if [ -n "$APK_URL" ]; then
            echo "=== APK yuklanmoqda: $APK_URL ==="
            curl -L -o loto-app.apk "$APK_URL"
            if [ -f loto-app.apk ]; then
              ls -la loto-app.apk
              echo "APK muvaffaqiyatli yuklandi!"
            else
              echo "APK yuklab olinmadi"
            fi
          else
            echo "=== APK URL topilmadi ==="
            echo "Expo Dashboard: https://expo.dev/accounts/Farhodbek1995/projects/loto-app/builds"
          fi

      - name: 📱 APK faylni artifact sifatida yuklash
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loto-app-release
          path: LotoApp/*.apk
          retention-days: 90
