name: Build Loto APK (lokal)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 📥 Repositoryni yuklab olish
        uses: actions/checkout@v4

      - name: 🟢 Node.js 22 o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: ☕ Java 17 o'rnatish
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 📦 Node modules keshlash
        uses: actions/cache@v4
        with:
          path: LotoApp/node_modules
          key: node-modules-v4-${{ runner.os }}-${{ hashFiles('LotoApp/package-lock.json') }}

      - name: 📦 Bog'liqliklarni o'rnatish
        working-directory: LotoApp
        run: |
          node --version
          npm --version
          npm install --legacy-peer-deps
          ls node_modules/expo/package.json && echo "✅ expo installed" || { echo "❌ expo NOT installed"; exit 1; }

      - name: 🔧 Android SDK setup
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list 2>&1 | head -5 || true

      - name: 🏗️ Expo Prebuild (android papkasini yaratish)
        working-directory: LotoApp
        run: |
          npx expo prebuild --platform android --clean
          echo "=== android/ papkasi yaratildi ==="
          ls -la android/

      - name: 📦 JS Bundle yaratish (index.android.bundle)
        working-directory: LotoApp
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file App.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res/
          echo "=== Bundle yaratildi ==="
          ls -lah android/app/src/main/assets/index.android.bundle

      - name: 📝 Gradle wrapper ruxsat berish
        working-directory: LotoApp/android
        run: chmod +x gradlew

      - name: 🔨 Gradle bilan APK build qilish
        working-directory: LotoApp/android
        run: |
          ./gradlew assembleDebug --stacktrace
          echo "=== APK qidirilmoqda ==="
          find . -name "*.apk" -type f

      - name: 📤 APK ni topish va ko'chirish
        working-directory: LotoApp
        run: |
          APK_PATH=$(find android -name "*.apk" -path "*/release/*" -type f | head -1)
          if [ -z "$APK_PATH" ]; then
            APK_PATH=$(find android -name "*.apk" -type f | head -1)
          fi
          if [ -z "$APK_PATH" ]; then
            echo "❌ APK topilmadi!"
            find android -name "*.apk" -type f 2>/dev/null || echo "Hech qanday APK fayli yo'q"
            exit 1
          fi
          echo "✅ APK: $APK_PATH"
          cp "$APK_PATH" ./loto-app.apk
          ls -lah loto-app.apk
          echo "✅ APK tayyor!"

      - name: 📱 APK artifact sifatida saqlash
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loto-app-release
          path: LotoApp/loto-app.apk
          retention-days: 90
          if-no-files-found: warn
