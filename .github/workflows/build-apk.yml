name: Build Loto APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Repositoryni yuklab olish
        uses: actions/checkout@v4

      - name: 🟢 Node.js 18 o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: 📦 Bog'liqliklarni o'rnatish
        working-directory: LotoApp
        run: npx expo install --fix

      - name: 🔧 EAS CLI o'rnatish
        working-directory: LotoApp
        run: npm install -g eas-cli@latest

      - name: 🔗 EAS Loyihasini yaratish
        working-directory: LotoApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas init --non-interactive --force

      - name: 🤖 EAS Build (APK)
        working-directory: LotoApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build -p android --profile preview --non-interactive --wait

      - name: 📱 APK faylni artifact sifatida yuklash
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loto-app-release
          path: LotoApp/*.apk
          retention-days: 90
