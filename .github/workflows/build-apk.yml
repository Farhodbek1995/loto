name: Build Loto APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 📥 Repositoryni yuklab olish
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20 o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Node modules keshlash
        uses: actions/cache@v4
        with:
          path: LotoApp/node_modules
          key: node-modules-v2-${{ runner.os }}-${{ hashFiles('LotoApp/package-lock.json') }}

      - name: 📦 Bog'liqliklarni o'rnatish
        working-directory: LotoApp
        run: npm install --legacy-peer-deps

      - name: 🔧 EAS CLI o'rnatish
        run: npm install -g eas-cli@latest

      - name: 🤖 EAS Build (APK)
        working-directory: LotoApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "=== EAS Build boshlanmoqda ==="
          eas build -p android --profile preview --non-interactive --wait 2>&1 | tee build-output.txt
          echo "=== Build natijasi ==="
          cat build-output.txt

      - name: 📥 APK yuklab olish
        working-directory: LotoApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          APK_URL=$(grep -oE 'https://expo\.dev/artifacts/eas/[^[:space:]]+\.apk' build-output.txt | tail -1)
          if [ -n "$APK_URL" ]; then
            echo "✅ APK URL: $APK_URL"
            curl -L -o loto-app.apk "$APK_URL"
            ls -lah loto-app.apk
            echo "✅ APK muvaffaqiyatli yuklandi!"
          else
            echo "⚠️ APK URL topilmadi. Build loglari:"
            cat build-output.txt
            echo "📌 EAS Dashboard: https://expo.dev/accounts/katush.uz/projects/loto-app/builds"
            exit 1
          fi

      - name: 📱 APK artifact sifatida saqlash
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loto-app-release
          path: LotoApp/loto-app.apk
          retention-days: 90
          if-no-files-found: warn
