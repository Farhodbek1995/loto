name: Build Loto APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 📥 Repositoryni yuklab olish
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20 o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Node modules keshlash
        uses: actions/cache@v4
        with:
          path: LotoApp/node_modules
          key: node-modules-v2-${{ runner.os }}-${{ hashFiles('LotoApp/package-lock.json') }}

      - name: 📦 Bog'liqliklarni o'rnatish
        working-directory: LotoApp
        run: npm install --legacy-peer-deps

      - name: 🔧 EAS CLI o'rnatish
        run: npm install -g eas-cli@latest

      - name: 🤖 EAS Build + APK yuklab olish
        working-directory: LotoApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "=== EAS Build boshlanmoqda ==="
          BUILD_OUTPUT=$(eas build -p android --profile preview --non-interactive --wait 2>&1)
          BUILD_EXIT=$?
          echo "$BUILD_OUTPUT"
          echo "=== Build exit code: $BUILD_EXIT ==="
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "⚠️ EAS Build xatolik bilan tugadi."
            exit 1
          fi
          echo ""
          echo "=== APK URL qidirilmoqda ==="
          APK_URL=$(echo "$BUILD_OUTPUT" | grep -oP 'https?://[^[:space:]]*\.apk' | tail -1)
          if [ -z "$APK_URL" ]; then
            APK_URL=$(echo "$BUILD_OUTPUT" | grep -oP 'https?://expo\.dev/[^[:space:]]+' | tail -1)
          fi
          if [ -n "$APK_URL" ]; then
            echo "✅ APK URL: $APK_URL"
            curl -L -o loto-app.apk "$APK_URL"
            ls -lah loto-app.apk
            echo "✅ APK muvaffaqiyatli yuklandi!"
          else
            echo "⚠️ APK URL topilmadi (regex mos kelmadi)."
            echo "📌 EAS Dashboard: https://expo.dev/accounts/katush.uz/projects/loto-app/builds"
            exit 1
          fi

      - name: 📱 APK artifact sifatida saqlash
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loto-app-release
          path: LotoApp/loto-app.apk
          retention-days: 90
          if-no-files-found: warn
