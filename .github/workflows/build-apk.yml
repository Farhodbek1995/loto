name: Build Loto APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 📥 Repositoryni yuklab olish
        uses: actions/checkout@v4

      - name: 🟢 Node.js 20 o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Node modules keshlash
        uses: actions/cache@v4
        with:
          path: LotoApp/node_modules
          key: node-modules-v2-${{ runner.os }}-${{ hashFiles('LotoApp/package-lock.json') }}

      - name: 📦 Bog'liqliklarni o'rnatish
        working-directory: LotoApp
        run: npm install --legacy-peer-deps

      - name: 🔧 EAS CLI o'rnatish
        run: npm install -g eas-cli@latest

      - name: 🤖 EAS Build (APK)
        working-directory: LotoApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build -p android --profile preview --non-interactive --wait
          echo ""
          echo "======================================"
          echo "✅ BUILD MUVAFFAQIYATLI YAKUNLANDI!"
          echo "======================================"
          echo ""
          echo "📥 APK yuklab olish:"
          echo "   https://expo.dev/accounts/katush.uz/projects/loto-app/builds"
