name: Build Loto APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Qo'lda ishga tushirish

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 📥 Repositoryni yuklab olish
        uses: actions/checkout@v4

      - name: 🟢 Node.js 18 o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: LotoApp/package-lock.json

      - name: 📦 Bog'liqliklarni o'rnatish
        working-directory: LotoApp
        run: npm ci || npm install

      - name: 🔧 Expo CLI o'rnatish
        working-directory: LotoApp
        run: npm install -g eas-cli

      - name: 🤖 EAS Build (APK)
        working-directory: LotoApp
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build -p android --profile preview --non-interactive --wait

      - name: 📱 APK faylni yuklash (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: loto-app-release
          path: LotoApp/*.apk
          retention-days: 90
          compression-level: 9
